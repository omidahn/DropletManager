name: Android APK

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-main-apk:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Restore google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "Missing GOOGLE_SERVICES_JSON secret."
            exit 1
          fi
          printf '%s' "$GOOGLE_SERVICES_JSON" > app/google-services.json

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: droplet-manager-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  build-release-apk:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK for native symbols
        run: sdkmanager "ndk;27.0.12077973"

      - name: Restore google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "Missing GOOGLE_SERVICES_JSON secret."
            exit 1
          fi
          printf '%s' "$GOOGLE_SERVICES_JSON" > app/google-services.json

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "Missing ANDROID_KEYSTORE_BASE64 secret."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build release artifacts
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew bundleRelease assembleRelease --no-daemon

      - name: Package native debug symbols
        run: |
          SYMBOL_DIR="app/build/intermediates/native_symbol_tables/release/extractReleaseNativeSymbolTables/out"
          if [ ! -d "$SYMBOL_DIR" ]; then
            echo "Native symbol directory not found: $SYMBOL_DIR"
            exit 1
          fi
          cd "$SYMBOL_DIR"
          zip -r "$GITHUB_WORKSPACE/app/build/outputs/native-debug-symbols.zip" .

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: droplet-manager-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Upload release AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: droplet-manager-release-aab
          path: app/build/outputs/bundle/release/*.aab
          if-no-files-found: error

      - name: Upload ProGuard mapping artifact
        uses: actions/upload-artifact@v4
        with:
          name: droplet-manager-release-mapping
          path: app/build/outputs/mapping/release/mapping.txt
          if-no-files-found: error

      - name: Upload native symbols artifact
        uses: actions/upload-artifact@v4
        with:
          name: droplet-manager-native-debug-symbols
          path: app/build/outputs/native-debug-symbols.zip
          if-no-files-found: error

      - name: Inspect existing GitHub release
        id: release_probe
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace("refs/tags/", "");
            try {
              const { data: release } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              core.setOutput("exists", "true");
              core.setOutput("draft", String(Boolean(release.draft)));
              core.setOutput("immutable", String(Boolean(release.immutable)));
              core.setOutput("html_url", release.html_url ?? "");
            } catch (error) {
              if (error.status === 404) {
                core.setOutput("exists", "false");
                core.setOutput("draft", "false");
                core.setOutput("immutable", "false");
                core.setOutput("html_url", "");
              } else {
                throw error;
              }
            }

      - name: Upload GitHub release asset
        if: steps.release_probe.outputs.immutable != 'true' || steps.release_probe.outputs.draft == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
            app/build/outputs/mapping/release/mapping.txt
            app/build/outputs/native-debug-symbols.zip
          generate_release_notes: true

      - name: Note immutable release skip
        if: steps.release_probe.outputs.immutable == 'true' && steps.release_probe.outputs.draft != 'true'
        run: |
          echo "A published immutable GitHub release already exists for ${GITHUB_REF_NAME}."
          echo "Skipping release asset upload to avoid failing the build."
          echo "Download the APK/AAB from the workflow artifacts for this run."
